<html>
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background-color: #2c3e50; 
      color: #ecf0f1;            
      font-family: 'Poppins', sans-serif; 
      margin: 0; padding: 0;
      display: flex; flex-direction: column; align-items: center;    
    }
    header {
      background-color: #34495e; width: 100%; padding: 15px 0;
      display: flex; justify-content: space-around; align-items: center;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
    }
    header .logo { color: #f1c40f; font-size: 20px; font-weight: bold; }
    header nav a { color: #ecf0f1; text-decoration: none; margin: 0 15px; transition: 0.3s; }
    header nav a:hover { color: #1abc9c; }

    h1 { color: #f1c40f; margin-top: 40px; }
    h2 { color: #f1c40f; margin-top: 40px; }
    .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
.card {
      background-color: #34495e; border: 2px solid #e74c3c; border-radius: 10px;
      padding: 0px; 
      width: 280px; /* 👈 Increased width from 200px to 280px so photos look bigger */
      text-align: center; overflow: hidden;
      box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.3); transition: transform 0.3s;
    }
    .card:hover { transform: translateY(-10px); border-color: #1abc9c; }
    .card h3 { color: #f1c40f; margin: 0 0 10px 0; }
    
.card img {
      width: 100%;       
      height: 320px;      /* 👈 Increased from 250px to 320px so the image takes up most of the card */
      object-fit: cover;  
      object-position: center; 
    }

    .card-text {
      padding: 8px 5px;   /* 👈 Shrunk the text area padding to make it compact */
    }

    .card h3 { 
      color: #f1c40f; 
      margin: 2px 0;      /* 👈 Tightened the heading margins */
      font-size: 16px;    /* 👈 Slightly smaller font size to save space */
    }

    .card p {
      margin: 2px 0 5px 0; /* 👈 Tightened the paragraph description margins */
      font-size: 12px;     /* 👈 Smaller description text so it fits perfectly */
    }
    button { background-color: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    
    @media (max-width: 600px) {
      .card-container {
        flex-direction: column; 
        align-items: center;
      }
      .card {
        width: 85%; 
      }
      header {
        flex-direction: column; 
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">🎒 Zar Chi's Travel</div>
    <nav>
      <a href="gindex.html"><i class="fas fa-home"></i>Home</a>
      <a href="#"><i class="fas fa-map-marker-alt"></i>Destinations</a>
      <a href="gabout.html"><i class="fas fa-user"></i>About</a> 
    </nav>
  </header>

  <h1>My Dream Travel Destinations</h1>
  <p>I love exploring new places and experiencing different cultures.</p>
  
  <h2>Places I've Visited in Myanmar 🇲🇲</h2>

  <div class="card-container">

    <div class="card">
      <img id="baganImg" src="Bagan1.jpg" data-state="1" alt="Bagan Temple" style="cursor:pointer;" onclick="switchBagan()">
      <div class="card-text" onclick="openModal('Bagan Trip', 'ပုဂံမြို့ရဲ့ ရှေးဟောင်းဘုရားပုထိုးတွေနဲ့ သာယာလှတဲ့ နေဝင်ချိန်အလှကို ခံစားခဲ့ရပါတယ်။')" style="cursor:pointer; padding: 15px 10px;">
        <h3>Bagan</h3>
        <p>Ancient temples and hot air balloons.</p>
      </div>
    </div>

    <div class="card">
      <img id="inleImg" src="Inle1.jpg" data-state="1" alt="Inle Lake" style="cursor:pointer;" onclick="switchInle()">
      <div class="card-text" onclick="openModal('Inle Lake Trip', 'အင်းလေးကန်ရဲ့ ရိုးရာလှေလှော်ခတ်ပုံတွေနဲ့ ရေပေါ်မျှောအလှတွေကို သွားရောက်လည်ပတ်ခဲ့ပါတယ်။')" style="cursor:pointer; padding: 15px 10px;">
        <h3>Inle Lake</h3>
        <p>Beautiful floating gardens and culture.</p>
      </div>
    </div>

  </div> 

  <button id="myButton">လျှို့ဝှက်ချက်ကို နှိပ်ကြည့်ပါ</button>

  <script>
    let myName = "Zar Chi Win";
    alert("Welcome to " + myName + "'s travel website! 🌍");
    document.getElementById("myButton").onclick = function() {
      alert("I'm traveling to Bangkok next week - BKK ✈️");
    };

    // 🌟 Function to toggle Bagan images
    function switchBagan() {
      let img = document.getElementById("baganImg");
      let state = img.getAttribute("data-state");
      if (state === "1") {
        img.src = "Bagan2.jpg";
        img.setAttribute("data-state", "2");
      } else {
        img.src = "Bagan1.jpg";
        img.setAttribute("data-state", "1");
      }
    }

    // 🌟 Function to toggle Inle images
    function switchInle() {
      let img = document.getElementById("inleImg");
      let state = img.getAttribute("data-state");
      if (state === "1") {
        img.src = "Inle2.jpg";
        img.setAttribute("data-state", "2");
      } else {
        img.src = "Inle1.jpg";
        img.setAttribute("data-state", "1");
      }
    }

    // 🌟 ပေါ့ပ်အပ်ကို ဖွင့်ပေးမယ့် Function
    function openModal(title, text) {
      document.getElementById("modalTitle").innerText = title;
      document.getElementById("modalText").innerText = text;
      document.getElementById("myModal").style.display = "flex";
    }

    // 🌟 ပေါ့ပ်အပ်ကို ပြန်ပိတ်ပေးမယ့် Function
    function closeModal() {
      document.getElementById("myModal").style.display = "none";
    }
  </script>

  <div id="myModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; z-index:1000;">
    <div style="background:#34495e; padding:30px; border-radius:10px; width:300px; text-align:center; border:2px solid #1abc9c;">
      <h2 id="modalTitle" style="color:#f1c40f; margin-top:0;"></h2>
      <p id="modalText" style="color:#ecf0f1;"></p>
      <button onclick="closeModal()" style="background:#e74c3c; color:white; padding:8px 20px; border:none; border-radius:5px; cursor:pointer; margin-top:15px;">ပိတ်မည်</button>
    </div>
  </div>
</body>
</html>
